<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <title>GoBeyond | Formación de Alto Impacto</title>
    <meta name="description" content="GoBeyond impulsa formación de alto impacto en Project Management, Six Sigma y Scrum." />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              gobeyond: {
                bg: '#050505',
                blue: '#007AFF',
                'blue-glow': 'rgba(0, 122, 255, 0.15)',
                ink: '#ffffff',
                'ink-soft': '#a1a1aa',
              },
            },
          },
        },
      }
    </script>

    <style>
      :root {
        background-color: #050505;
        color: #ffffff;
      }

      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Refinamiento de Glassmorphism Global */
      .gobeyond-glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }

      /* Estilo Editorial para Títulos */
      .text-editorial {
        letter-spacing: -0.05em;
        line-height: 0.95;
      }

      /* Animaciones de Revelado */
      .gobeyond-reveal {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .gobeyond-reveal.is-visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
